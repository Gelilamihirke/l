name: Deploy Frontend

on:
  push:
    branches:
      - master   # ✅ changed from main → master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to GitHub Pages
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git clone --depth 1 --branch gh-pages https://github.com/${{ github.repository }} gh-pages || git clone https://github.com/${{ github.repository }} gh-pages
          
          cp -r * gh-pages/
          cd gh-pages
          git add .
          git commit -m "Auto deploy" || echo "No changes to commit"
          git push